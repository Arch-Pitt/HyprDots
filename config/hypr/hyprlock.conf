# =========================
# BACKGROUND
# =========================
background {
    monitor =
    path = ~/.config/hypr/hyprlock/wallpaper.jpg
    blur_passes = 2
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.15
}

# =========================
# GENERAL
# =========================
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# =========================
# INPUT FIELD
# =========================
input-field {
    monitor =
    size = 220, 50
    outline_thickness = 1

    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    check_color = rgba(255, 255, 255, 0.6)
    fail_color = rgba(255, 255, 255, 0.3)

    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font

    placeholder_text = <i><span foreground="##ffffff88">Password</span></i>

    hide_input = false

    position = 0, -180
    halign = center
    valign = center
    rounding = 8
}

# =========================
# TIME
# =========================
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family = JetBrains Mono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

# =========================
# DATE
# =========================
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 20
    font_family = JetBrains Mono Nerd Font

    position = 0, 110
    halign = center
    valign = center
}

# =========================
# USER
# =========================
label {
    monitor =
    text = Hi, $USER
    color = rgba(255, 255, 255, 0.85)
    font_size = 18
    font_family = JetBrains Mono Nerd Font

    position = 0, -120
    halign = center
    valign = center
}